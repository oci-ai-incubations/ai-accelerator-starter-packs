# =============================================================================
# NVIDIA VSS - Schema Overrides
# =============================================================================
# Only contains differences from common_schema.yaml
# VSS does NOT need Oracle 26ai database

title: "Video Search and Summarization"
description: "OCI accelerator pack for AI video moderation: ingest video, index scenes, then search/summarize to flag nudity, violence, weapons, drugs, alcohol—no more manual review."
informationalText: |
  Deploy Video Search and Summarization on OCI's GPU infrastructure.

  Ingest video, index scenes, then search and summarize content to flag nudity,
  violence, weapons, drugs, and alcohol—replacing manual review with AI-powered
  video moderation using NVIDIA NIMs.

# =============================================================================
# Output Groups - Remove database section
# =============================================================================
outputGroups:
  - title: "VSS Service"
    outputs:
      - starter_pack_url
      - starter_pack_deployment_name

  - title: "Management & API"
    outputs:
      - blueprints_portal_url
      - corrino_api_url
      - corrino_admin_username
      - corrino_admin_password

  - title: "Monitoring"
    outputs:
      - grafana_url
      - prometheus_url
      - grafana_admin_username
      - grafana_admin_password

# =============================================================================
# Variable Groups - Remove database section
# =============================================================================
variableGroups:
  - title: "Basic Hidden"
    variables:
      - compartment_ocid
      - tenancy_ocid
      - region
    visible: false

  - title: "Deployment Configuration"
    variables:
      - starter_pack_size
      - worker_node_availability_domain

  - title: "Advanced Options"
    variables:
      - accelerator_pack_stack_version
      - deploy_private_k8s_and_loadbalancer
      - create_bastion
      - skip_capacity_check
      - use_custom_dns
      - fqdn_custom_domain
      - create_policies
      - deploy_application
      - existing_cluster_id

  - title: "Oracle 26ai Database (required when auth-service is enabled)"
    visible:
      eq:
        - ${enable_auth_service}
        - "true"
    variables:
      - db_username
      - db_password

# =============================================================================
# Variables - VSS specific
# =============================================================================
variables:
  # VSS ships with per-user JWT auth on by default. Shown in the ORM UI
  # (visible) and defaulted true so operators get auth out of the box but can
  # opt out. When on, the Oracle 26ai Database group becomes visible
  # (auth-service is backed by 26ai). The shared default (common_schema.yaml)
  # stays false for packs whose auth integration is still opt-in.
  enable_auth_service:
    type: boolean
    default: true
    visible: true

  starter_pack_size:
    type: enum
    enum:
      - poc
      - small
      - medium
    title: "VSS Deployment Size"
    description: "<strong>POC</strong> - 2x VM.GPU.A10.2 (2x NVIDIA A10 24GB), 2x VM.Standard.E5.Flex (3 OCPU, 64GB Mem), 1 x VM.Standard.E5.Flex (16 OCPU, 260GB Mem), 450GB boot block storage, 1 Flexible Load Balancer | <strong>SMALL</strong> - 1x BM.GPU4.8 (8x A100 40GB), 2x VM.Standard.E5.Flex (3 OCPU, 64GB Mem), 1 x VM.Standard.E5.Flex (32 OCPU, 128GB Mem), 550GB boot block storage, 1 Flexible Load Balancer | <strong>MEDIUM</strong> - 2x BM.GPU.L40S.4 (8x L40S 48GB), 2x VM.Standard.E5.Flex (3 OCPU, 64GB Mem), 1 x VM.Standard.E5.Flex (32 OCPU, 128GB Mem), 550GB boot block storage, 1 Flexible Load Balancer"
    default: small
    required: true

  # Hide genai_region - not needed for VSS
  genai_region:
    visible: false

  # 26ai database credentials. Hidden unless enable_auth_service is on; vss
  # only provisions 26ai when auth-service is on (auth-service is backed by
  # 26ai). When visible, both are required — db_password feeds the ADB admin
  # password and is null-checked by a precondition in 26ai.tf.
  db_username:
    type: string
    title: "Database Admin Username"
    description: "Admin username for the Oracle 26ai Autonomous Database (used by the auth-service)."
    default: "ADMIN"
    required: true
    visible:
      eq:
        - ${enable_auth_service}
        - "true"

  db_password:
    type: password
    title: "Database Admin Password"
    description: "Admin password for the Oracle 26ai Autonomous Database. Must be at least 12 characters, contain at least 1 uppercase letter, and at least 1 special character."
    required: true
    visible:
      eq:
        - ${enable_auth_service}
        - "true"

  # Hide object storage secret keys
  aws_access_key_id:
    visible: false

  aws_secret_access_key:
    visible: false

  # Make AD required for VSS (GPU starter pack)
  worker_node_availability_domain:
    title: "Worker Node Availability Domain where GPU capacity is available (EX: TrcQ:US-ASHBURN-AD-2)"
    description: "To find ADs, go to Governance & Administration -> Limits, quotas and usage -> Edit Filters -> Service = Compute, Scope = Selected AD -> In Search, type: 'gpu4' or 'l40s' depending on pack size."
    required: true
    visible: true

# =============================================================================
# Outputs - VSS specific titles, hide database
# =============================================================================
outputs:
  starter_pack_url:
    type: string
    title: "VSS Service URL"
    visible: true

  db_username:
    visible: false

  db_password:
    visible: false

  autonomous_database_name:
    visible: false

  autonomous_database_id:
    visible: false

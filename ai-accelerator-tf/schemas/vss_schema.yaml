# =============================================================================
# NVIDIA VSS - Schema Overrides
# =============================================================================
# Only contains differences from common_schema.yaml
# VSS does NOT need Oracle 26ai database

title: "Video Search and Summarization"
description: "OCI accelerator pack for AI video moderation: ingest video, index scenes, then search/summarize to flag nudity, violence, weapons, drugs, alcohol—no more manual review."
informationalText: |
  Deploy Video Search and Summarization on OCI's GPU infrastructure.

  Ingest video, index scenes, then search and summarize content to flag nudity,
  violence, weapons, drugs, and alcohol—replacing manual review with AI-powered
  video moderation using NVIDIA NIMs.

# =============================================================================
# Output Groups - Remove database section
# =============================================================================
outputGroups:
  - title: "VSS Service"
    outputs:
      - starter_pack_url
      - starter_pack_deployment_name

  - title: "Management & API"
    outputs:
      - blueprints_portal_url
      - corrino_api_url
      - corrino_admin_username
      - corrino_admin_password

  - title: "Monitoring"
    outputs:
      - grafana_url
      - prometheus_url
      - grafana_admin_username
      - grafana_admin_password

# =============================================================================
# Variable Groups - Remove database section
# =============================================================================
variableGroups:
  - title: "Basic Hidden"
    variables:
      - compartment_ocid
      - tenancy_ocid
      - region
    visible: false

  - title: "Deployment Configuration"
    variables:
      - starter_pack_size
      - worker_node_availability_domain

  - title: "Administrator Account"
    variables:
      - corrino_admin_username
      - corrino_admin_password
      - corrino_admin_email

  - title: "Advanced Options"
    variables:
      - skip_capacity_check
      - use_custom_dns
      - fqdn_custom_domain

# =============================================================================
# Variables - VSS specific
# =============================================================================
variables:
  starter_pack_size:
    type: enum
    enum:
      - poc
      - small
      - medium
    title: "VSS Deployment Size"
    description: "<strong>POC</strong> - 2x VM.GPU.A10.2 (2x NVIDIA A10 24GB), 2x VM.Standard.E5.Flex (3 OCPU, 64GB Mem), 1 x VM.Standard.E5.Flex (16 OCPU, 260GB Mem), 450GB boot block storage, 1 Flexible Load Balancer | <strong>SMALL</strong> - 1x BM.GPU4.8 (8x A100 40GB), 2x VM.Standard.E5.Flex (3 OCPU, 64GB Mem), 1 x VM.Standard.E5.Flex (32 OCPU, 128GB Mem), 550GB boot block storage, 1 Flexible Load Balancer | <strong>MEDIUM</strong> - 2x BM.GPU.L40S.4 (8x L40S 48GB), 2x VM.Standard.E5.Flex (3 OCPU, 64GB Mem), 1 x VM.Standard.E5.Flex (32 OCPU, 128GB Mem), 550GB boot block storage, 1 Flexible Load Balancer"
    default: small
    required: true

  # Hide genai_region - not needed for VSS
  genai_region:
    visible: false

  cuopt_frontend_enabled:
    visible: false

  # Hide database variables
  db_username:
    visible: false

  db_password:
    visible: false

  # Hide object storage secret keys
  aws_access_key_id:
    visible: false

  aws_secret_access_key:
    visible: false

  # Make AD required for VSS (GPU starter pack)
  worker_node_availability_domain:
    title: "Worker Node Availability Domain where GPU capacity is available (EX: TrcQ:US-ASHBURN-AD-2)"
    description: "To find ADs, go to Governance & Administration -> Limits, quotas and usage -> Edit Filters -> Service = Compute, Scope = Selected AD -> In Search, type: 'gpu4' or 'l40s' depending on pack size."
    required: true
    visible: true

# =============================================================================
# Outputs - VSS specific titles, hide database
# =============================================================================
outputs:
  starter_pack_url:
    type: string
    title: "VSS Service URL"
    visible: true

  db_username:
    visible: false

  db_password:
    visible: false

  autonomous_database_name:
    visible: false

  autonomous_database_id:
    visible: false

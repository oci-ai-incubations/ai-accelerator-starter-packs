# =============================================================================
# OCI AI Starter Packs - Common Schema
# =============================================================================
# This is the base schema. Category-specific schemas override these values.

title: "OCI AI Starter Packs"
description: "Pre-configured AI/ML Workload Deployments on OCI"
informationalText: "Select a pre-configured starter pack to quickly deploy AI/ML workloads on OCI."

schemaVersion: 1.1.0
version: "20190304"

source:
  type: quickstart

locale: "en"


# =============================================================================
# Output Groups - Common structure
# =============================================================================
outputGroups:
  - title: "Custom DNS Configuration Info"
    outputs:
      - external_ip
      - custom_dns_domain

  - title: "Service"
    outputs:
      - starter_pack_url
      - starter_pack_deployment_name

  - title: "Ingress API Key"
    outputs:
      - ingress_api_key
      - ingress_api_key_curl_example
    visible:
      eq:
        - add_api_key_to_ingress
        - "true"

  - title: "Frontend"
    outputs:
      - frontend_skin_urls
      - frontend_skin_name
      - frontend_skin_provider
      - frontend_skins_learn_more

  - title: "Bastion Access"
    outputs:
      - bastion_ssh_target
      - bastion_public_ip
      - bastion_private_ssh_key
      - worker_ssh_target_format
      - worker_ssh_via_bastion_command
    visible:
      eq:
        - create_bastion
        - "true"

  - title: "Management & API"
    outputs:
      - blueprints_portal_url
      - corrino_api_url
      - corrino_admin_username
      - corrino_admin_password

  - title: "Monitoring"
    outputs:
      - grafana_url
      - prometheus_url
      - grafana_admin_username
      - grafana_admin_password

  - title: "Version Info"
    outputs:
      - ai_accelerator_stack_version

  - title: "Infrastructure (for App-Only Stack)"
    outputs:
      - cluster_id
      - autonomous_db_subnet_id
      - node_subnet_id
      - node_pool_id
      - vcn_id

# =============================================================================
# Variable Groups - Common structure
# =============================================================================
variableGroups:
  - title: "Basic Hidden"
    variables:
      - compartment_ocid
      - tenancy_ocid
      - region
    visible: false

  - title: "Deployment Configuration"
    variables:
      - starter_pack_size

  - title: "Administrator Account"
    variables:
      - corrino_admin_username
      - corrino_admin_password
      - corrino_admin_email

  - title: "Ingress Security"
    variables:
      - add_api_key_to_ingress
      - ingress_api_key

  - title: "Advanced Options"
    variables:
      - accelerator_pack_stack_version
      - deploy_private_k8s_and_loadbalancer
      - create_bastion
      - skip_capacity_check
      - use_custom_dns
      - fqdn_custom_domain
      - create_policies
      - deploy_application
      - existing_cluster_id
      - existing_node_subnet_id
      - existing_autonomous_db_subnet_id

# =============================================================================
# Variables - Common definitions
# =============================================================================
variables:
  # Starter Pack Size - overridden by each category
  starter_pack_size:
    type: enum
    enum:
      - small
    title: "Deployment Size"
    description: "Select the deployment size"
    default: small
    required: true

  # Category is set via starter_pack_category.auto.tfvars
  starter_pack_category:
    type: string
    visible: false

  # Ingress API Key Authentication
  add_api_key_to_ingress:
    type: boolean
    title: "Protect Backend Ingresses With API Key"
    description: "When enabled, requests to backend nginx ingresses (blueprint-injected cuopt, llamastack, vss paths) require an <code>Authorization: Bearer &lt;key&gt;</code> header. Frontend UIs and in-cluster traffic are unaffected. Toggling this flag requires redeploying affected blueprints."
    default: false
    required: false

  ingress_api_key:
    type: password
    title: "Ingress API Key (leave blank to auto-generate)"
    description: "Optional bearer token. Leave blank to auto-generate a 48-character key surfaced via the sensitive Terraform output. Must be at least 32 characters when provided."
    required: false
    visible:
      eq:
        - add_api_key_to_ingress
        - "true"

  # Capacity Check Option
  skip_capacity_check:
    type: boolean
    title: "Skip Capacity Check"
    description: "Skip the compute capacity pre-validation that runs before deployment. Enable this only if you are certain capacity exists in your region or want to bypass the pre-check. <strong>Warning:</strong> If capacity is unavailable, the deployment will fail later during resource provisioning."
    default: false
    required: false

  worker_node_availability_domain:
    type: string
    visible: false

  # OCI Identity (Hidden)
  compartment_ocid:
    type: oci:identity:compartment:id
    title: "Compartment"
    description: "The compartment in which to create resources"
    required: true

  tenancy_ocid:
    type: string
    visible: false

  region:
    type: string
    visible: false

  # Admin Credentials - common across all packs
  corrino_admin_username:
    type: string
    minLength: 3
    maxLength: 50
    title: "Admin Username"
    description: "Username for accessing the management portal and API"
    required: true

  corrino_admin_password:
    type: password
    title: "Admin Password"
    description: "Password for the admin account"
    required: true

  corrino_admin_email:
    type: string
    title: "Admin Email"
    description: "Email address for admin account notifications and password recovery"
    required: true

  tavily_api_key:
    type: password
    title: "Tavily API Key"
    description: "Optional API key for enabling Tavily-powered web search integrations. Leave blank to disable."
    required: false
    visible: false

  # Oracle 26ai Database Credentials
  db_username:
    type: string
    title: "Database Admin Username"
    description: "Admin username for the Oracle 26ai Autonomous Database"
    default: "ADMIN"
    required: true

  db_password:
    type: password
    title: "Database Admin Password"
    description: "Admin password for the Oracle 26ai Autonomous Database. Must be at least 12 characters, contain at least 1 uppercase letter, and at least 1 special character."
    required: true

  # Hidden DB config variables - common across all packs
  db_name:
    type: string
    visible: false

  db_display_name:
    type: string
    visible: false

  db_compute_count:
    type: number
    visible: false

  db_data_storage_size_in_tbs:
    type: number
    visible: false

  db_license_model:
    type: string
    visible: false

  db_workload_type:
    type: string
    visible: false

  deploy_private_k8s_and_loadbalancer:
    type: boolean
    title: "Deploy Private K8s and Load Balancer"
    description: "Deploys a completely private stack not accessible via internet. More secure, but the final URL will not be accessible from the public internet without first port forwarding. Suitable for production deployments."
    default: false
    required: false

  create_policies:
    type: boolean
    title: "Create IAM Policies"
    description: "Unchecking box will not create IAM policies with stack. Requires an admin to create policies."
    default: true
    required: false

  deploy_application:
    type: boolean
    title: "Deploy Application"
    description: "When unchecked, only infrastructure (VCN, OKE cluster, node pools) is created. Use this to create an infrastructure-only stack for node reuse."
    default: true
    required: false

  existing_cluster_id:
    type: string
    title: "Existing Cluster OCID"
    description: "OCID of an existing OKE cluster to deploy onto. When provided, all infrastructure creation (VCN, OKE, node pools) is skipped. Get this value from the cluster_id output of an infrastructure-only stack."
    default: ""
    required: false

  # ---------------------------------
  # Hidden Variables
  # ---------------------------------
  use_instance_principal:
    type: boolean
    visible: false

  fingerprint:
    type: string
    visible: false

  private_key_path:
    type: string
    visible: false

  current_user_ocid:
    type: string
    visible: false

  show_advanced:
    type: boolean
    visible: false

  apps_endpoint_visibility:
    type: string
    visible: false

  blueprints_endpoint_visibility:
    type: string
    visible: false

  cluster_endpoint_visibility_existing_vcn:
    type: string
    visible: false

  cluster_endpoint_visibility_new_vcn:
    type: string
    visible: false

  cluster_load_balancer_visibility:
    type: string
    visible: false

  cluster_workers_visibility:
    type: string
    visible: false

  create_bastion:
    type: boolean
    title: "Enable Bastion Host"
    description: "Create a bastion host and operator instance for SSH access to the cluster. When enabled, the private SSH key (if auto-generated) is available as a downloadable output."
    default: false
    required: false

  bastion_boot_volume_size_in_gbs:
    type: string
    visible: false

  bastion_instance_shape:
    type: map
    valueType: string
    visible: false

  operator_boot_volume_size_in_gbs:
    type: string
    visible: false

  operator_instance_shape:
    type: map
    valueType: string
    visible: false

  ssh_public_key:
    type: string
    visible: false

  cluster_options_add_ons_is_kubernetes_dashboard_enabled:
    type: boolean
    visible: false

  k8s_version:
    type: string
    visible: false

  node_pool_name:
    type: string
    visible: false

  network_configuration_mode:
    type: string
    visible: false

  network_cidrs:
    type: map
    valueType: string
    visible: false

  existing_vcn_id:
    type: string
    visible: false

  existing_endpoint_subnet_id:
    type: string
    visible: false

  existing_lb_subnet_id:
    type: string
    visible: false

  existing_node_subnet_id:
    type: string
    title: "Existing Node Subnet OCID"
    description: "Subnet OCID for the worker node pool. Required when using an existing cluster. Get this value from the node_subnet_id output of an infrastructure-only stack."
    default: ""
    required: false

  existing_pods_subnet_id:
    type: string
    visible: false

  existing_services_subnet_id:
    type: string
    visible: false

  existing_autonomous_db_subnet_id:
    type: string
    title: "Existing Autonomous DB Subnet OCID"
    description: "Subnet OCID for the Autonomous Database private endpoint. Required when using an existing cluster. Get this value from the autonomous_db_subnet_id output of an infrastructure-only stack."
    default: ""
    required: false

  ingress_nginx_enabled:
    type: boolean
    visible: false

  ingress_hosts:
    type: string
    visible: false

  ingress_hosts_include_nip_io:
    type: boolean
    visible: false

  ingress_load_balancer_shape:
    type: string
    visible: false

  ingress_load_balancer_shape_flex_max:
    type: string
    visible: false

  ingress_load_balancer_shape_flex_min:
    type: string
    visible: false

  ingress_tls:
    type: boolean
    visible: false

  ingress_cluster_issuer:
    type: string
    visible: false

  ingress_email_issuer:
    type: string
    visible: false

  use_custom_dns:
    type: boolean
    title: "Use Custom DNS"
    description: "Enable to use your own domain instead of the automatic nip.io domain. Recommended for production deployments."
    default: false
    required: false

  fqdn_custom_domain:
    type: string
    title: "Custom Domain"
    description: "Your base domain (e.g., ai.mycompany.com). Must be a fully qualified domain name with a TLD (like .com, .ai, .ml). Do not include the wildcard asterisk (*). However, you must create a wildcard DNS A-record (*.ai.mycompany.com) pointing to the Load Balancer IP shown in the outputs in your DNS registrar."
    pattern: "^[a-zA-Z0-9][a-zA-Z0-9-]*(\\.[a-zA-Z0-9-]+)*\\.[a-zA-Z]{2,}$"
    required: true
    visible:
      eq:
        - use_custom_dns
        - "true"

  cuopt_frontend_admin_username:
    type: string
    visible: false

  cuopt_frontend_admin_password:
    type: password
    visible: false

  google_maps_api_key:
    type: string
    visible: false

  nip_io_domain:
    type: string
    visible: false

  fqdn_domain_mode_selector:
    type: string
    visible: false

  kong_enabled:
    type: boolean
    visible: false

  override_hostnames:
    type: boolean
    visible: false

  setup_credential_provider_for_ocir:
    type: boolean
    visible: false

  share_data_with_corrino_team_enabled:
    type: boolean
    visible: false

  nvme_raid_level:
    type: integer
    visible: false

  accelerator_pack_stack_version:
    title: "Accelerator Pack Stack Version"
    type: enum
    enum:
      - "v0.0.6"
      - "v0.0.5"
      - "v0.0.4"
      - "v0.0.3"
      - "v0.0.2"
      - "v0.0.1"
    default: "v0.0.6"
    required: true

  corrino_image_version:
    title: "Corrino Image Version"
    type: enum
    enum:
      - "1.0.12"
    default: "1.0.12"
    required: true
    visible: false

  oci_tag_values:
    type: map
    valueType: string
    visible: false

  genai_region:
    type: string
    visible: false

  aws_access_key_id:
    type: string
    visible: false

  aws_secret_access_key:
    type: string
    visible: false

# =============================================================================
# Outputs - Common definitions with proper types
# =============================================================================
outputs:
  starter_pack_url:
    type: string
    title: "Service URL"
    visible: true

  starter_pack_deployment_name:
    type: string
    title: "Deployment Name"
    visible: true

  blueprints_portal_url:
    type: string
    title: "Management Portal URL"
    visible: true

  corrino_api_url:
    type: string
    title: "API Endpoint"
    visible: true

  corrino_admin_username:
    type: string
    title: "Admin Username"
    visible: true

  corrino_admin_password:
    type: string
    title: "Admin Password"
    visible: true

  grafana_url:
    type: string
    title: "Grafana Dashboard URL"
    visible: true

  prometheus_url:
    type: string
    title: "Prometheus URL"
    visible: true

  grafana_admin_username:
    type: string
    title: "Grafana Username"
    visible: true

  grafana_admin_password:
    type: string
    title: "Grafana Password"
    visible: true

  external_ip:
    type: string
    title: "Load Balancer IP Address"
    description: "Point your wildcard A-record to this IP address."
    visible: true

  custom_dns_domain:
    type: string
    title: "Wildcard A-Record Domain"
    description: "Create a wildcard A-record for this domain in your DNS registrar, pointing to the Load Balancer IP above. Then re-apply this stack."
    visible: true

  db_username:
    type: string
    title: "Database Username"
    visible: true

  db_password:
    type: string
    title: "Database Password"
    visible: true

  autonomous_database_name:
    type: string
    title: "Database Name"
    visible: true

  autonomous_database_id:
    type: ocid
    title: "Database OCID"
    visible: true

  frontend_skin_urls:
    type: map
    title: "Frontend URLs"
    visible: true

  frontend_skin_name:
    type: string
    title: "Frontend Skin"
    visible: true

  frontend_skin_provider:
    type: string
    title: "Frontend Provider"
    visible: true

  frontend_skins_learn_more:
    type: link
    title: "Frontend Skin Details"
    displayText: "Learn More"
    visible: true

  ingress_api_key:
    type: string
    title: "Ingress API Key"
    description: "Copy this token and pass it as 'Authorization: Bearer <token>' when calling protected backend endpoints."
    sensitive: true
    visible: true

  ingress_api_key_curl_example:
    type: copyableString
    title: "Backend Curl Example"
    visible: true

  # Hidden outputs
  cluster_id:
    type: string
    title: "OKE Cluster OCID"
    description: "Use as existing_cluster_id when deploying an app-only stack."
    visible: true

  cluster_name:
    type: string
    visible: false

  public_cluster_endpoint_full:
    type: string
    visible: false

  private_cluster_endpoint_full:
    type: string
    visible: false

  public_cluster_endpoint:
    type: string
    visible: false

  private_cluster_endpoint:
    type: string
    visible: false

  cluster_endpoint_visibility:
    type: string
    visible: false

  vcn_id:
    type: string
    visible: false

  vcn_cidr:
    type: string
    visible: false

  autonomous_db_subnet_id:
    type: string
    title: "Autonomous DB Subnet OCID"
    description: "Use as existing_autonomous_db_subnet_id when deploying an app-only stack."
    visible: true

  node_subnet_id:
    type: string
    title: "Node Subnet OCID"
    description: "Use as existing_node_subnet_id when deploying an app-only stack."
    visible: true

  node_pool_id:
    type: string
    visible: false

  node_pool_kubernetes_version:
    type: string
    visible: false

  bastion_ssh_target:
    type: string
    title: "Bastion SSH Target"
    description: "SSH target as opc@<ip> — copy for: ssh -i <key.pem> <target>"
    visible: true

  bastion_public_ip:
    type: string
    title: "Bastion Public IP"
    description: "Public IP of the bastion host"
    visible: true

  bastion_private_ssh_key:
    type: string
    title: "Bastion Private SSH Key"
    description: "Private SSH key for bastion access. Copy and save as a .pem file (e.g., bastion_key.pem) with chmod 600. Only shown when bastion is enabled and no custom SSH key was provided."
    sensitive: true
    visible: true

  worker_ssh_target_format:
    type: string
    title: "Worker SSH Target Format"
    description: "Format for worker node SSH target. Use <username>@<worker_ip> — get worker IPs from: kubectl get nodes -o wide"
    visible: true

  worker_ssh_via_bastion_command:
    type: string
    title: "SSH to Worker via Bastion"
    description: "Full SSH command template. Replace <path_to_key.pem> with your key and <user>@<worker_ip> with e.g. opc@10.0.97.217"
    visible: true

  bastion_private_ip:
    type: string
    visible: false

  operator_private_ip:
    type: string
    visible: false

  ssh_private_key:
    type: string
    visible: false

  ssh_public_key:
    type: string
    visible: false

  connection_instructions:
    type: string
    visible: false

  kubeconfig_command:
    type: string
    visible: false

  lb_subnet_bp_control_plane_id:
    type: string
    visible: false

  lb_subnet_apps_id:
    type: string
    visible: false

  deployment_id:
    type: string
    visible: false

  app_name:
    type: string
    visible: false

  ai_accelerator_stack_version:
    type: string
    title: "Stack Version"
    visible: true

  aws_access_key_id:
    type: string
    visible: false

  aws_secret_access_key:
    type: string
    visible: false

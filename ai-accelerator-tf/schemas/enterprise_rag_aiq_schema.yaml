# =============================================================================
# NVIDIA Enterprise RAG + AIQ Research Assistant - Schema Overrides
# =============================================================================
# Extends enterprise_rag baseline with additional outputs/description for AIQ

title: "Enterprise Agentic AI Starter Kit"
description: "Full-stack agentic AI environment on OCI powered by NVIDIA AIQ. Deploys reasoning models, vector DB, observability, application layer, and more in minutes. Customize and extend to build your own agentic workflows."
informationalText: |
  Deploy a full-stack agentic AI environment on OCI powered by NVIDIA AIQ.

  Deploys reasoning models, vector DB, observability, and an application layer
  in minutes. Customize and extend to build your own agentic workflows.
  The stack includes:
  - NVIDIA NIM for reasoning and instruct LLM inference
  - Embedding and Reranking NIMs
  - Milvus vector database
  - NV-Ingest for document processing
  - AIQ agentic backend and frontend experience
  - Observability and monitoring

  Note: This deployment is managed via Helm charts, not OCI AI Blueprints.

outputGroups:
  - title: "Enterprise RAG Service"
    outputs:
      - starter_pack_url
      - starter_pack_deployment_name

variableGroups:
  - title: "Basic Hidden"
    variables:
      - compartment_ocid
      - tenancy_ocid
      - region
    visible: false

  - title: "Deployment Configuration"
    variables:
      - starter_pack_size
      - tavily_api_key
      - worker_node_availability_domain

  - title: "Administrator Account"
    variables:
      - corrino_admin_username
      - corrino_admin_password
      - corrino_admin_email

variables:
  starter_pack_size:
    type: enum
    enum:
      - small
      - medium
    title: "Enterprise RAG + AIQ Deployment Size"
    description: "<strong>SMALL</strong> - 2x BM.GPU4.8 nodes. <strong>MEDIUM</strong> - 2x BM.GPU.A100-v2.8 nodes (use if BM.GPU4.8 is unavailable in your region)."
    default: small
    required: true

  db_username:
    visible: false

  db_password:
    visible: false

  use_custom_dns:
    visible: false

  worker_node_availability_domain:
    title: "Worker Node Availability Domain where GPU capacity is available (EX: TrcQ:US-ASHBURN-AD-2)"
    description: "To find ADs, go to Governance & Administration -> Limits, quotas and usage -> Edit Filters -> Service = Compute, Scope = Selected AD -> In Search, type: 'gpu4' (SMALL) or 'a100' (MEDIUM)."
    required: true
    visible: true

  tavily_api_key:
    visible: true

  # Hide object storage secret keys
  aws_access_key_id:
    visible: false

  aws_secret_access_key:
    visible: false

outputs:
  starter_pack_url:
    type: string
    title: "Enterprise RAG Service URL"

# =============================================================================
# Warehouse Pick Path Optimizer - Schema Overrides
# =============================================================================
# Only contains differences from common_schema.yaml
# Warehouse Pick Path REQUIRES Oracle 26ai database (keeps DB sections visible)

title: "Warehouse Pick Path Optimizer Starter Pack"
description: "Warehouse Pick Path Optimization with NVIDIA cuOpt and Oracle 26ai"
informationalText: |
  Deploy a Warehouse Pick Path Optimizer using NVIDIA cuOpt GPU solver
  and Oracle 26ai for data persistence.

  Optimize warehouse pick paths and wave plans to increase throughput
  and reduce travel distance using GPU-accelerated route optimization.

# =============================================================================
# Output Groups - Include database section
# =============================================================================
outputGroups:
  - title: "Optimizer Service"
    outputs:
      - starter_pack_url
      - starter_pack_deployment_name

  - title: "Management & API"
    outputs:
      - blueprints_portal_url
      - corrino_api_url
      - corrino_admin_username
      - corrino_admin_password

  - title: "Oracle 26ai Database"
    outputs:
      - autonomous_database_name
      - autonomous_database_id
      - db_username
      - db_password

  - title: "Monitoring"
    outputs:
      - grafana_url
      - prometheus_url
      - grafana_admin_username
      - grafana_admin_password

# =============================================================================
# Variable Groups
# =============================================================================
variableGroups:
  - title: "Basic Hidden"
    variables:
      - compartment_ocid
      - tenancy_ocid
      - region
    visible: false

  - title: "Deployment Configuration"
    variables:
      - starter_pack_size

  - title: "Administrator Account"
    variables:
      - corrino_admin_username
      - corrino_admin_password
      - corrino_admin_email

  - title: "Oracle 26ai Database"
    variables:
      - db_username
      - db_password

# =============================================================================
# Variables - Warehouse Pick Path specific
# =============================================================================
variables:
  starter_pack_size:
    type: enum
    enum:
      - small
    title: "Optimizer Deployment Size"
    description: "<strong>SMALL</strong> - 2x VM.Standard.E5.Flex (control plane), 1x VM.Standard.E5.Flex (8 OCPU, 64GB - CPU worker), 1x VM.GPU.A10.1 (GPU worker for cuOpt solver), Oracle 26ai Autonomous Database (4 ECPU, 2TB storage)"
    default: small
    required: true

  # Database password with validation pattern
  db_password:
    type: password
    title: "Database Admin Password"
    pattern: "^(?=.*[a-z])(?=.*[A-Z])(?=.*\\d)(?=.*[!@#$%^&*]).{12,}$"
    description: "Must be 12+ characters with uppercase, lowercase, number, and special character (!@#$%^&*)"
    required: true

# =============================================================================
# Outputs - Warehouse Pick Path specific titles
# =============================================================================
outputs:
  starter_pack_url:
    type: string
    title: "Optimizer Service URL"

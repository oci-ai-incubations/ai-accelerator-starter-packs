# =============================================================================
# NVIDIA cuOpt - Schema Overrides
# =============================================================================
# Only contains differences from common_schema.yaml
# cuOpt does NOT need Oracle 26ai database

title: "Vehicle Delivery Route Optimizer"
description: "GPU-accelerated fleet route optimization on OCI using NVIDIA cuOpt NIM—deploy in minutes and get a ready API endpoint to cut miles, time, and cost."
informationalText: |
  Deploy the Vehicle Delivery Route Optimizer on OCI's high-performance GPU infrastructure.

  Powered by NVIDIA cuOpt NIM, this pack uses GPU-accelerated algorithms to optimize
  fleet delivery routes—cutting miles, time, and cost up to 100x faster than
  traditional solvers. Deploys a ready API endpoint in minutes.

# =============================================================================
# Output Groups - Remove database section
# =============================================================================
outputGroups:
  - title: "Service"
    outputs:
      - starter_pack_url
      - starter_pack_deployment_name

  - title: "Management & API"
    outputs:
      - blueprints_portal_url
      - corrino_api_url
      - corrino_admin_username
      - corrino_admin_password

  - title: "Monitoring"
    outputs:
      - grafana_url
      - prometheus_url
      - grafana_admin_username
      - grafana_admin_password

# =============================================================================
# Variable Groups - Remove database section
# =============================================================================
variableGroups:
  - title: "Basic Hidden"
    variables:
      - compartment_ocid
      - tenancy_ocid
      - region
    visible: false

  - title: "Deployment Configuration"
    variables:
      - starter_pack_size
      - worker_node_availability_domain

  - title: "cuOpt Pack Configuration"
    visible:
      or:
        - ${skin_cuopt_core}
        - ${skin_cuopt_partner}
    variables:
      - google_maps_api_key
      - cuopt_openweathermap_api_key
      - genai_region

  - title: "Oracle 26ai Database (required when auth-service is enabled)"
    visible: ${enable_auth_service}
    variables:
      - db_username
      - db_password

# =============================================================================
# Variables - cuOpt specific
# =============================================================================
variables:
  starter_pack_size:
    type: enum
    enum:
      - poc
      - small
      - medium
    title: "cuOpt Deployment Size"
    description: "<strong>SMALL</strong> - 1x VM.GPU.A10.2 (2x A10 24GB), 2x VM.Standard.E5.Flex (3 OCPU, 64GB Mem), 1 x VM.Standard.E5.Flex (4 OCPU, 32GB Mem), 1TB storage, 1 Flexible Load Balancer, OCI GenAI Service - On Demand (no GPU required), 1 Autonomous Database 2 ECPU 2 TB | <strong>SMALL</strong> - 1x BM.GPU4.8 (8x A100 40GB), 2x VM.Standard.E5.Flex (3 OCPU, 64GB Mem), 1 x VM.Standard.E5.Flex (4 OCPU, 32GB Mem), 1TB storage, 1 Flexible Load Balancer, OCI GenAI Service - On Demand (no GPU required), 1 Autonomous Database 2 ECPU 2 TB | <strong>MEDIUM</strong> - 1x BM.GPU.A100-v2.8 (8x A100 80GB), 2x VM.Standard.E5.Flex (3 OCPU, 64GB Mem), 1 x VM.Standard.E5.Flex (4 OCPU, 32GB Mem), 1TB storage, 1 Flexible Load Balancer, OCI GenAI Service - On Demand (no GPU required), 1 Autonomous Database 2 ECPU 2 TB"
    default: poc
    required: true

  # The cuOpt pack ships with per-user JWT auth on by default. Shown in the ORM
  # UI (visible) and defaulted true so operators get auth out of the box but can
  # opt out. When on, the Oracle 26ai Database group becomes visible
  # (auth-service is backed by 26ai). NOTE: the cuopt backend requires auth and
  # fails closed at startup if this is turned off — disabling is unsupported.
  enable_auth_service:
    type: boolean
    default: true
    visible: true

  google_maps_api_key:
    type: string
    title: "Google Maps API Key"
    description: "API key for Google Maps visualization in the cuOpt frontend. Leave empty to use the default Leaflet map."
    default: ""
    visible: true

  # cuopt_frontend_admin_* are legacy: the Express server in the cuopt FE used
  # them for /api/auth/login. That server was retired in phase 5; auth-service
  # handles user login now. Hide them and stop asking operators to set them.
  cuopt_frontend_admin_username:
    type: string
    visible: false

  cuopt_frontend_admin_password:
    type: password
    visible: false

  genai_region:
    title: "OCI GenAI Services Region"
    description: "Region for OCI GenAI Services. Note: Does not have to match the region of the cluster."
    type: enum
    default: us-ashburn-1
    visible: true
    enum:
      - uk-london-1
      - eu-frankfurt-1
      - eu-frankfurt-2
      - us-chicago-1
      - us-ashburn-1
      - us-phoenix-1
      - me-dubai-1
      - me-riyadh-1
      - ap-osaka-1
      - ap-hyderbad-1
      - sa-saopaulo-1

  # 26ai database credentials. Hidden unless enable_auth_service is on; cuopt
  # only provisions 26ai when auth-service is on (auth-service is backed by
  # 26ai). When visible, both are required (admin_password feeds the ADB
  # resource and is null-checked by a precondition in 26ai.tf).
  db_username:
    type: string
    title: "Database Admin Username"
    description: "Admin username for the Oracle 26ai Autonomous Database (used by the auth-service)."
    default: "ADMIN"
    required: true
    visible: ${enable_auth_service}

  db_password:
    type: password
    title: "Database Admin Password"
    description: "Admin password for the Oracle 26ai Autonomous Database. Must be at least 12 characters, contain at least 1 uppercase letter, and at least 1 special character."
    required: true
    visible: ${enable_auth_service}

  # Image version pinned in vars.tf. The pack ships fully-versioned and the
  # ORM Resource Manager UI must not surface per-image overrides.
  cuopt_backend_image_version:
    type: string
    visible: false

  # cuopt-backend operational knobs. cuopt_tls_verify is the recovery lever
  # when in-cluster upstreams present self-signed certs (default true =
  # production-safe).
  cuopt_tls_verify:
    type: boolean
    visible: false

  cuopt_openweathermap_api_key:
    type: password
    title: "OpenWeatherMap API Key"
    description: "Optional API key for live weather data via the cuopt-backend's /api/weather/* routes. When blank, the backend falls back to a deterministic mock weather generator (still useful for routing demos)."
    required: false
    visible: true

  # Make AD required for cuOpt (GPU starter pack)
  worker_node_availability_domain:
    title: "Worker Node Availability Domain where GPU capacity is available (EX: TrcQ:US-ASHBURN-AD-2)"
    description: "To find ADs, go to Governance & Administration -> Limits, quotas and usage -> Edit Filters -> Service = Compute, Scope = Selected AD -> In Search, type: 'gpu4' or 'a100' depending on pack size."
    required: true
    visible: true

# =============================================================================
# Outputs - cuOpt specific titles, hide database
# =============================================================================
outputs:
  starter_pack_url:
    type: string
    title: "cuOpt API URL"

  db_username:
    visible: false

  db_password:
    visible: false

  autonomous_database_name:
    visible: false

  autonomous_database_id:
    visible: false

  # Hide object storage secret keys
  aws_access_key_id:
    visible: false

  aws_secret_access_key:
    visible: false

# =============================================================================
# NVIDIA cuOpt - Schema Overrides
# =============================================================================
# Only contains differences from common_schema.yaml
# cuOpt does NOT need Oracle 26ai database

title: "NVIDIA cuOpt Optimization Starter Pack"
description: "GPU-Accelerated Optimization for Routing, Scheduling & Logistics"
informationalText: |
  Deploy NVIDIA cuOpt on OCI's high-performance GPU infrastructure.
  
  cuOpt uses GPU-accelerated algorithms to solve complex optimization problems 
  including vehicle routing, job scheduling, and logistics planning up to 
  100x faster than traditional solvers.

# =============================================================================
# Output Groups - Remove database section
# =============================================================================
outputGroups:
  - title: "Service"
    outputs:
      - starter_pack_url
      - starter_pack_deployment_name

  - title: "Management & API"
    outputs:
      - blueprints_portal_url
      - corrino_api_url
      - corrino_admin_username
      - corrino_admin_password

  - title: "Monitoring"
    outputs:
      - grafana_url
      - prometheus_url
      - grafana_admin_username
      - grafana_admin_password

# =============================================================================
# Variable Groups - Remove database section
# =============================================================================
variableGroups:
  - title: "Basic Hidden"
    variables:
      - compartment_ocid
      - tenancy_ocid
      - region
    visible: false

  - title: "Deployment Configuration"
    variables:
      - starter_pack_size
      - cuopt_frontend_enabled
      - genai_region
      - worker_node_availability_domain

  - title: "Administrator Account"
    variables:
      - corrino_admin_username
      - corrino_admin_password
      - corrino_admin_email

# =============================================================================
# Variables - cuOpt specific
# =============================================================================
variables:
  starter_pack_size:
    type: enum
    enum:
      - poc
      - small
      - medium
    title: "cuOpt Deployment Size"
    description: "<strong>SMALL</strong> - 1x BM.GPU4.8 (8x A100 40GB), 2x VM.Standard.E5.Flex (3 OCPU, 64GB Mem), 1 x VM.Standard.E5.Flex (4 OCPU, 32GB Mem), 1TB storage, 1 Flexible Load Balancer, OCI GenAI Service - On Demand (no GPU required) | <strong>MEDIUM</strong> - 1x BM.GPU.A100-v2.8 (8x A100 80GB), 2x VM.Standard.E5.Flex (3 OCPU, 64GB Mem), 1 x VM.Standard.E5.Flex (4 OCPU, 32GB Mem), 1TB storage, 1 Flexible Load Balancer, OCI GenAI Service - On Demand (no GPU required)"
    default: small
    required: true

  cuopt_frontend_enabled:
    type: boolean
    title: "Enable cuOpt Frontend"
    description: "Enable cuOpt frontend"
    default: false
    visible: true
    required: true

  genai_region:
    title: "OCI GenAI Services Region"
    description: "Region for OCI GenAI Services. Note: Does not have to match the region of the cluster."
    type: enum
    default: us-ashburn-1
    enum:
      - uk-london-1
      - eu-frankfurt-1
      - eu-frankfurt-2
      - us-chicago-1
      - us-ashburn-1
      - us-phoenix-1
      - me-dubai-1
      - me-riyadh-1
      - ap-osaka-1
      - ap-hyderbad-1
      - sa-saopaulo-1
    visible:
      and:
        - cuopt_frontend_enabled

  # Hide database variables
  db_username:
    visible: false

  db_password:
    visible: false

  # Make AD required for cuOpt (GPU starter pack)
  worker_node_availability_domain:
    title: "Worker Node Availability Domain where GPU capacity is available (EX: TrcQ:US-ASHBURN-AD-2)"
    description: "To find ADs, go to Governance & Administration -> Limits, quotas and usage -> Edit Filters -> Service = Compute, Scope = Selected AD -> In Search, type: 'gpu4' or 'a100' depending on pack size."
    required: true
    visible: true

# =============================================================================
# Outputs - cuOpt specific titles, hide database
# =============================================================================
outputs:
  starter_pack_url:
    type: string
    title: "cuOpt API URL"
  
  starter_pack_frontend_url:
    type: string
    title: "cuOpt Frontend Service URL"

  db_username:
    visible: false

  db_password:
    visible: false

  autonomous_database_name:
    visible: false

  autonomous_database_id:
    visible: false

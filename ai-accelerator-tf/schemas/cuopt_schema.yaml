# =============================================================================
# NVIDIA cuOpt - Schema Overrides
# =============================================================================
# Only contains differences from common_schema.yaml
# cuOpt does NOT need Oracle 26ai database

title: "NVIDIA cuOpt Optimization Starter Pack"
description: "GPU-Accelerated Optimization for Routing, Scheduling & Logistics"
informationalText: |
  Deploy NVIDIA cuOpt on OCI's high-performance GPU infrastructure.
  
  cuOpt uses GPU-accelerated algorithms to solve complex optimization problems 
  including vehicle routing, job scheduling, and logistics planning up to 
  100x faster than traditional solvers.

# =============================================================================
# Output Groups - Remove database section
# =============================================================================
outputGroups:
  - title: "cuOpt Service"
    outputs:
      - starter_pack_url
      - starter_pack_deployment_name

  - title: "Management & API"
    outputs:
      - blueprints_portal_url
      - corrino_api_url
      - corrino_admin_username
      - corrino_admin_password

  - title: "Monitoring"
    outputs:
      - grafana_url
      - prometheus_url
      - grafana_admin_username
      - grafana_admin_password

# =============================================================================
# Variable Groups - Remove database section
# =============================================================================
variableGroups:
  - title: "Basic Hidden"
    variables:
      - compartment_ocid
      - tenancy_ocid
      - region
    visible: false

  - title: "Deployment Configuration"
    variables:
      - starter_pack_size

  - title: "Administrator Account"
    variables:
      - corrino_admin_username
      - corrino_admin_password
      - corrino_admin_email

# =============================================================================
# Variables - cuOpt specific
# =============================================================================
variables:
  starter_pack_size:
    type: enum
    enum:
      - small
      - medium
    title: "cuOpt Deployment Size"
    description: "<strong>SMALL</strong> - 1x BM.GPU4.8 (8x A100 40GB), 2x VM.Standard.E5.Flex (3 OCPU, 64GB Mem), 1 x VM.Standard.E5.Flex (4 OCPU, 32GB Mem), 1TB storage, 1 Flexible Load Balancer, OCI GenAI Service - On Demand (no GPU required) | <strong>MEDIUM</strong> - 1x BM.GPU.A100-v2.8 (8x A100 80GB), 2x VM.Standard.E5.Flex (3 OCPU, 64GB Mem), 1 x VM.Standard.E5.Flex (4 OCPU, 32GB Mem), 1TB storage, 1 Flexible Load Balancer, OCI GenAI Service - On Demand (no GPU required)"
    default: small
    required: true

  # Hide database variables
  db_username:
    visible: false

  db_password:
    visible: false

# =============================================================================
# Outputs - cuOpt specific titles, hide database
# =============================================================================
outputs:
  starter_pack_url:
    type: link
    title: "Open cuOpt Service"
    displayText: "Open cuOpt Service"

  db_username:
    visible: false

  db_password:
    visible: false

  autonomous_database_name:
    visible: false

  autonomous_database_id:
    visible: false

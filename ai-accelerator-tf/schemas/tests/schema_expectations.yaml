# schema_expectations.yaml - Edit this file to add/change schema assertions

required_top_level_keys:
  - title
  - variables
  - outputGroups
  - variableGroups
  - schemaVersion

# Per-category: starter_pack_size must match vars.tf starter_pack_configs
starter_pack_sizes:
  cuopt: [poc, small, medium]
  vss: [poc, small, medium]
  paas_rag: [small, medium]
  enterprise_rag: [small]
  enterprise_rag_aiq: [small, medium]

# Outputs that must exist in every schema (referenced in outputGroups)
required_outputs:
  - starter_pack_url
  - starter_pack_deployment_name
  - blueprints_portal_url
  - bastion_ssh_target
  - bastion_private_ssh_key
  - worker_ssh_target_format
  - worker_ssh_via_bastion_command
  - corrino_admin_username
  - corrino_admin_password
  - frontend_skin_name
  - frontend_skin_image_uri
  - frontend_skin_provider
  - frontend_skins_learn_more

# Variables that must exist in every schema
required_variables:
  - starter_pack_size
  - starter_pack_category
  - compartment_ocid
  - deploy_private_k8s_and_loadbalancer
  - create_bastion
  - create_policies
  - corrino_admin_username
  - corrino_admin_password
  - corrino_admin_email
  - frontend_skin

# Per-category: required outputs/variables, absent checks, property assertions
# absent_* = names that must NOT exist (different from visible:false, which hides but keeps in schema)
category_specific:
  cuopt:
    required_outputs: [starter_pack_frontend_url]
    required_variables: [cuopt_frontend_enabled, genai_region]
    absent_outputs: []
    absent_variables: []
    variable_properties:
      db_password:
        visible: false
      cuopt_frontend_enabled:
        visible: true
        type: boolean
      frontend_skin:
        type: enum
    output_properties:
      starter_pack_url:
        type: string
        visible: true

  paas_rag:
    required_outputs: [autonomous_database_id, autonomous_database_name, db_username]
    required_variables: [db_password]
    variable_properties:
      db_password:
        visible: true
        type: password
      frontend_skin:
        type: enum
        visible: true
    output_properties:
      starter_pack_url:
        type: string
        visible: true

  vss:
    absent_outputs: []
    absent_variables: []
    variable_properties:
      db_password:
        visible: false
      db_username:
        visible: false
      frontend_skin:
        type: enum
        visible: true
    output_properties:
      starter_pack_url:
        type: string
        visible: true
      db_password:
        visible: false
      db_username:
        visible: false
      autonomous_database_name:
        visible: false
      autonomous_database_id:
        visible: false
      aws_access_key_id:
        visible: false
      aws_secret_access_key:
        visible: false

  enterprise_rag:
    variable_properties:
      db_password:
        type: password
        required: true
      frontend_skin:
        type: enum
        visible: true
    output_properties:
      starter_pack_url:
        type: string
        visible: true

  enterprise_rag_aiq:
    variable_properties:
      frontend_skin:
        type: enum
        visible: true

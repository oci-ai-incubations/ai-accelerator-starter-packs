# Frontend skin catalog — consumed by both create_final_schema.py (repo root) and Terraform
learn_more_url: "https://github.com/oci-ai-incubations/ai-accelerator-starter-packs/blob/main/docs/skins/README.md"

cuopt:
  default: "Vehicle Route Optimizer Frontend (Core App)"
  skins:
    - key: "Vehicle Route Optimizer Frontend (Core App)"
      image_uri: "iad.ocir.io/iduyx1qnmway/corrino-devops-repository:cuopt-interactive-frontend-v0.0.2"
      provider: "Oracle"
      container_port: "3000"
      container_env: []
    - key: "Oracle Interactive - Route visualization (Partner Contributed)"
      image_uri: "iad.ocir.io/iduyx1qnmway/corrino-devops-repository:cuopt-interactive-frontend-v0.0.3"
      provider: "Oracle"
      container_port: "80"
      container_env:
        - key: "NODE_ENV"
          value: "production"
        - key: "PORT"
          value: "3001"

vss:
  default: "Oracle Custom - Enhanced search (Core App)"
  skins:
    - key: "Oracle Custom - Enhanced search (Core App)"
      image_uri: "iad.ocir.io/iduyx1qnmway/corrino-devops-repository:vss-oracle-ux-dev-0.0.4"
      provider: "Oracle"
      container_port: "3000"
      container_env: []

paas_rag:
  default: "Oracle Net - Chat interface (Core App)"
  skins:
    - key: "Oracle Net - Chat interface (Core App)"
      image_uri: "iad.ocir.io/iduyx1qnmway/corrino-devops-repository/oracle-net-frontend:v0.0.3"
      provider: "Oracle"
      container_port: "3000"
      container_env: []

enterprise_rag:
  default: "Oracle RAG - Document chat (Core App)"
  skins:
    - key: "Oracle RAG - Document chat (Core App)"
      image_uri: "iad.ocir.io/iduyx1qnmway/enterprise-rag-frontend:v0.0.2"
      provider: "Oracle"
      container_port: "3000"
      container_env: []

enterprise_rag_aiq:
  default: "NVIDIA AIRA - Agentic workflows (Core App)"
  skins:
    - key: "NVIDIA AIRA - Agentic workflows (Core App)"
      image_uri: "nvcr.io/nvidia/blueprint/aira-frontend:v1.2.0"
      provider: "NVIDIA"
      container_port: "3000"
      container_env: []

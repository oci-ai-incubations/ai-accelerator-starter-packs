# =============================================================================
# Enterprise RAG - Schema Overrides
# =============================================================================
# Only contains differences from common_schema.yaml
# PaaS RAG REQUIRES Oracle 26ai database (keeps DB sections visible)

title: "Enterprise RAG with Oracle 26ai Starter Pack"
description: "Serverless RAG with Oracle 26ai & OCI GenAI Services"
informationalText: |
  Deploy Enterprise RAG using Oracle 26ai and OCI PaaS services.
  
  Build production-ready RAG applications with Oracle's AI-optimized 26ai 
  database for vector storage and OCI GenAI services for LLM inference.
  
  No GPU infrastructure required - fully managed and serverless.

# =============================================================================
# Output Groups - Include database section
# =============================================================================
outputGroups:
  - title: "RAG Service"
    outputs:
      - starter_pack_url
      - starter_pack_deployment_name

  - title: "Management & API"
    outputs:
      - blueprints_portal_url
      - corrino_api_url
      - corrino_admin_username
      - corrino_admin_password

  - title: "Oracle 26ai Database"
    outputs:
      - autonomous_database_name
      - autonomous_database_id
      - db_username
      - db_password

  - title: "Monitoring"
    outputs:
      - grafana_url
      - prometheus_url
      - grafana_admin_username
      - grafana_admin_password

# =============================================================================
# Variable Groups - Include database, GenAI region in Advanced Options
# =============================================================================
variableGroups:
  - title: "Basic Hidden"
    variables:
      - compartment_ocid
      - tenancy_ocid
      - region
    visible: false

  - title: "Deployment Configuration"
    variables:
      - starter_pack_size

  - title: "Administrator Account"
    variables:
      - corrino_admin_username
      - corrino_admin_password
      - corrino_admin_email

  - title: "Oracle 26ai Database"
    variables:
      - db_username
      - db_password

  - title: "Advanced Options"
    variables:
      - skip_capacity_check
      - use_custom_dns
      - fqdn_custom_domain
      - genai_region

# =============================================================================
# Variables - RAG specific
# =============================================================================
variables:
  starter_pack_size:
    type: enum
    enum:
      - small
      - medium
    title: "RAG Deployment Size"
    description: "<strong>SMALL</strong> - 2x VM.Standard.E5.Flex (6 OCPU, 48GB Mem), 1 x VM.Standard.E5.Flex (12 OCPU, 96GB Mem), Oracle 26ai Autonomous Database (4 ECPU, 2TB storage), OCI GenAI Service - On Demand (no GPU required) | <strong>MEDIUM</strong> - 2x VM.Standard.E5.Flex (6 OCPU, 48GB Mem), 1 x VM.Standard.E5.Flex (12 OCPU, 96GB Mem), Oracle 26ai Autonomous Database (8 ECPU, 8TB storage), OCI GenAI Service - On Demand (no GPU required)"
    default: small
    required: true

  # OCI GenAI region selection
  genai_region:
    title: "OCI GenAI Services Region"
    description: "Region for OCI GenAI Services. Note: Does not have to match the region of the cluster."
    type: enum
    default: us-chicago-1
    enum:
      - uk-london-1
      - eu-frankfurt-1
      - eu-frankfurt-2
      - us-chicago-1
      - us-ashburn-1
      - us-phoenix-1
      - me-dubai-1
      - me-riyadh-1
      - ap-osaka-1
      - ap-hyderbad-1
      - sa-saopaulo-1
    required: true
    visible: true

  # Database password with validation pattern
  db_password:
    type: password
    title: "Database Admin Password"
    pattern: "^(?=.*[a-z])(?=.*[A-Z])(?=.*\\d)(?=.*[!@#$%^&*]).{12,}$"
    description: "Must be 12+ characters with uppercase, lowercase, number, and special character (!@#$%^&*)"
    required: true

# =============================================================================
# Outputs - RAG specific titles
# =============================================================================
outputs:
  starter_pack_url:
    type: link
    title: "Open RAG Service"
    displayText: "Open RAG Service"

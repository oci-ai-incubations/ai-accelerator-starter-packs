title: OCI AI Starter Packs
description: OCI AI Starter Packs - Pre-configured AI/ML Workload Deployments
informationalText: Select a pre-configured starter pack to quickly deploy AI/ML workloads on OCI. Each starter pack includes optimized compute shapes and pre-configured blueprints for specific use cases.
schemaVersion: 1.1.0
version: "20190304"

source:
  type: quickstart

outputGroups:
  - title: "Deployment Information"
    outputs:
      - external_ip
      - blueprints_portal_url
      - corrino_api_url

  - title: "Admin Credentials"
    outputs:
      - corrino_admin_username_output
      - corrino_admin_nonce_output

  - title: "Monitoring"
    outputs:
      - corrino_grafana_url
      - grafana_admin_username
      - grafana_admin_password

locale: "en"

variableGroups:
  - title: "Basic Hidden"
    variables:
      - compartment_ocid
      - tenancy_ocid
      - region
    visible: false

  - title: "Starter Pack Selection"
    variables:
      - starter_pack_choice

  - title: "Admin Credentials"
    variables:
      - corrino_admin_username
      - corrino_admin_nonce
      - corrino_admin_email


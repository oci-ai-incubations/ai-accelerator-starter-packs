# ------------------------------------------------
# VARIABLES
# ------------------------------------------------

variables:
  # ---------------------------------
  # Required: Starter Pack Selection
  # ---------------------------------
  starter_pack_choice:
    type: enum
    enum:
      - cuopt_small
      - vss_medium
    title: "Starter Pack"
    description: "Select a pre-configured starter pack. 'cuopt_small' deploys NVIDIA cuOpt optimization workloads on BM.GPU4.8. 'vss_medium' deploys Video Search workloads on BM.GPU.B4.8."
    default: cuopt_small
    required: true

  # ---------------------------------
  # Required: OCI Identity (Hidden)
  # ---------------------------------
  compartment_ocid:
    type: oci:identity:compartment:id
    title: "Compartment"
    description: "The compartment in which to create resources"
    required: true

  # ---------------------------------
  # Required: Admin Credentials
  # ---------------------------------
  corrino_admin_username:
    type: string
    title: "Admin Username"
    description: "Username for the admin account"
    required: true

  corrino_admin_email:
    type: string
    title: "Admin Email"
    description: "Email address for the admin account"
    required: true

  corrino_admin_nonce:
    type: password
    title: "Admin Password"
    description: "Password for the admin account (you will be required to change this at first login)"
    required: true

  # ---------------------------------
  # Hidden Variables (visible: false)
  # These are required by vars.tf but should not appear in the UI
  # ---------------------------------

  # Admin and Authentication
  admin_email:
    type: string
    visible: false

  corrino_admin_password:
    type: string
    visible: false

  use_instance_principal:
    type: boolean
    visible: false

  fingerprint:
    type: string
    visible: false

  private_key_path:
    type: string
    visible: false

  user_ocid:
    type: string
    visible: false

  show_advanced:
    type: boolean
    visible: false

  # Endpoint Visibility
  apps_endpoint_visibility:
    type: string
    visible: false

  blueprints_endpoint_visibility:
    type: string
    visible: false

  cluster_endpoint_visibility_existing_vcn:
    type: string
    visible: false

  cluster_endpoint_visibility_new_vcn:
    type: string
    visible: false

  cluster_load_balancer_visibility:
    type: string
    visible: false

  cluster_workers_visibility:
    type: string
    visible: false

  # Bastion and Operator Configuration
  create_bastion:
    type: boolean
    visible: false

  bastion_boot_volume_size_in_gbs:
    type: string
    visible: false

  bastion_instance_shape:
    type: map
    visible: false

  operator_boot_volume_size_in_gbs:
    type: string
    visible: false

  operator_instance_shape:
    type: map
    visible: false

  ssh_public_key:
    type: string
    visible: false

  # Cluster Configuration
  cluster_options_add_ons_is_kubernetes_dashboard_enabled:
    type: boolean
    visible: false

  control_plane_node_pool_size:
    type: integer
    visible: false

  k8s_version:
    type: string
    visible: false

  node_pool_boot_volume_size_in_gbs:
    type: string
    visible: false

  node_pool_name:
    type: string
    visible: false

  # Network Configuration
  network_configuration_mode:
    type: string
    visible: false

  network_cidrs:
    type: map
    visible: false

  existing_vcn_id:
    type: string
    visible: false

  existing_endpoint_subnet_id:
    type: string
    visible: false

  existing_lb_subnet_id:
    type: string
    visible: false

  existing_node_subnet_id:
    type: string
    visible: false

  existing_pods_subnet_id:
    type: string
    visible: false

  existing_services_subnet_id:
    type: string
    visible: false

  # Ingress Configuration
  ingress_nginx_enabled:
    type: boolean
    visible: false

  ingress_hosts:
    type: string
    visible: false

  ingress_hosts_include_nip_io:
    type: boolean
    visible: false

  ingress_load_balancer_shape:
    type: string
    visible: false

  ingress_load_balancer_shape_flex_max:
    type: string
    visible: false

  ingress_load_balancer_shape_flex_min:
    type: string
    visible: false

  ingress_tls:
    type: boolean
    visible: false

  ingress_cluster_issuer:
    type: string
    visible: false

  ingress_email_issuer:
    type: string
    visible: false

  # Domain Configuration
  fqdn_domain_mode_selector:
    type: string
    visible: false

  fqdn_custom_domain:
    type: string
    visible: false

  nip_io_domain:
    type: string
    visible: false

  # Feature Flags
  is_nvaie_enabled:
    type: boolean
    visible: false

  kong_enabled:
    type: boolean
    visible: false

  override_hostnames:
    type: boolean
    visible: false

  setup_credential_provider_for_ocir:
    type: boolean
    visible: false

  share_data_with_corrino_team_enabled:
    type: boolean
    visible: false

  # Storage Configuration
  nvme_raid_level:
    type: integer
    visible: false

  # Versioning and Tags
  stack_version:
    type: string
    visible: false

  oci_tag_values:
    type: map
    visible: false


# -- NIMs deployed via NIM Operator (v2.5.0 requires apps.nvidia.com/v1alpha1 CRDs)
nimOperator:
  draResources:
    enabled: false
    name: "rag-claim"
    type: "TimeSlicing"

  # NIM LLM (Nemotron 3 Super 120B — 2 GPUs)
  nim-llm:
    enabled: true
    replicas: 1
    image:
      repository: nvcr.io/nim/nvidia/nemotron-3-super-120b-a12b
      pullPolicy: IfNotPresent
      tag: "1.8.0"
    resources:
      limits:
        nvidia.com/gpu: "8"
      requests:
        nvidia.com/gpu: "8"
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
    storage:
      pvc:
        create: true
        size: "500Gi"
    env:
      - name: NIM_HTTP_API_PORT
        value: "8000"
      - name: NIM_SERVED_MODEL_NAME
        value: "nvidia/nemotron-3-super-120b-a12b"
      - name: NIM_MAX_MODEL_LEN
        value: "32768"
    expose:
      service:
        type: ClusterIP
        port: 8000
        grpcPort: 8001

  # NIM Text Embedding
  nvidia-nim-llama-32-nv-embedqa-1b-v2:
    enabled: true
    replicas: 1
    image:
      repository: nvcr.io/nim/nvidia/llama-nemotron-embed-1b-v2
      tag: "1.13.0"
    resources:
      limits:
        nvidia.com/gpu: 1
      requests:
        nvidia.com/gpu: 1
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
    storage:
      pvc:
        create: true
        size: "50Gi"
    env:
      - name: OMP_NUM_THREADS
        value: "1"
      - name: NIM_TRITON_PERFORMANCE_MODE
        value: "throughput"
    expose:
      service:
        type: ClusterIP
        port: 8000
        name: "nemotron-embedding-ms"

  # NIM VLM Embedding (disabled)
  nvidia-nim-llama-nemotron-embed-vl-1b-v2:
    enabled: false
    image:
      repository: nvcr.io/nim/nvidia/llama-nemotron-embed-vl-1b-v2
      tag: "1.12.0"
    storage:
      pvc:
        create: true
        size: "50Gi"
    expose:
      service:
        type: ClusterIP
        port: 8000
        name: "nemotron-vlm-embedding-ms"

  # NIM Text Reranking
  nvidia-nim-llama-32-nv-rerankqa-1b-v2:
    enabled: true
    replicas: 1
    image:
      repository: nvcr.io/nim/nvidia/llama-nemotron-rerank-1b-v2
      tag: "1.10.0"
    resources:
      limits:
        nvidia.com/gpu: 1
      requests:
        nvidia.com/gpu: 1
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
    storage:
      pvc:
        create: true
        size: "50Gi"
    expose:
      service:
        type: ClusterIP
        port: 8000
        name: "nemotron-ranking-ms"

  # NIM Vision-Language (disabled)
  nim-vlm:
    enabled: false
    image:
      repository: nvcr.io/nim/nvidia/nemotron-nano-12b-v2-vl
      tag: "1.5.0"
    storage:
      pvc:
        create: true
        size: "50Gi"
    expose:
      service:
        type: ClusterIP
        port: 8000
        name: "nim-vlm"

# -- NV-Ingest dependency configuration
# subsection: nv-ingest
# NV-Ingest Service
nv-ingest:
  # remove milvus
  milvusDeployed: False
  imagePullSecrets:
    - name: "ngc-secret"
  enabled: true
  ngcApiSecret:
    create: false
  ngcImagePullSecret:
    create: false
  image:
    repository: "nvcr.io/nvidia/nemo-microservices/nv-ingest"
    tag: "26.1.2"
  resources:
    limits:
      nvidia.com/gpu: 0
      memory: "48Gi"
    requests:
      memory: "24Gi"
      cpu: "24000m"
  envVars:
    ARROW_DEFAULT_MEMORY_POOL: "system"
    INGEST_LOG_LEVEL: WARNING
    INGEST_RAY_LOG_LEVEL: "PRODUCTION"
    NV_INGEST_MAX_UTIL: 48
    INGEST_EDGE_BUFFER_SIZE: 64
    INGEST_DYNAMIC_MEMORY_THRESHOLD: "0.8"
    INGEST_DISABLE_DYNAMIC_SCALING: "false"
    MRC_IGNORE_NUMA_CHECK: 1
    READY_CHECK_ALL_COMPONENTS: "False"
    COMPONENTS_TO_READY_CHECK: "ALL"
    REDIS_MORPHEUS_TASK_QUEUE: morpheus_task_queue
    REDIS_INGEST_TASK_QUEUE: "ingest_task_queue"
    NV_INGEST_DEFAULT_TIMEOUT_MS: "1234"
    MAX_INGEST_PROCESS_WORKERS: 16
    EMBEDDING_NIM_ENDPOINT: "http://nemotron-embedding-ms:8000/v1"
    EMBEDDING_NIM_MODEL_NAME: "nvidia/llama-nemotron-embed-1b-v2"
    MESSAGE_CLIENT_HOST: "rag-redis-master"
    MESSAGE_CLIENT_PORT: 6379
    MESSAGE_CLIENT_TYPE: "redis"
    # MINIO_INTERNAL_ADDRESS: "rag-minio:9000"
    # MINIO_PUBLIC_ADDRESS: "http://localhost:9000"
    # MINIO_BUCKET: "nv-ingest"
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://localhost:4317"
    OTEL_TRACES_EXPORTER: "none"
    OTEL_METRICS_EXPORTER: "none"
    # Milvus not used for enterprise_rag (uses Oracle 26AI); set localhost to avoid pipeline hang
    MILVUS_ENDPOINT: "http://localhost:19530"
    MODEL_PREDOWNLOAD_PATH: "/workspace/models/"
    INSTALL_AUDIO_EXTRACTION_DEPS: "false"

    # OCR endpoints (NIM Operator service name: nemoretriever-ocr-v1)

# Default values for NVIDIA AI-Q Research Assistant (AIRA) Helm chart.
# Managed by Terraform in the AI Accelerator starter pack.

# -- AIQ namespace reference
namespace: "aiq"

# -- Global image pull secret for NGC resources
# Secret is pre-created by configure_oke.py; the chart just references it.
imagePullSecret:
  name: "ngc-secret"
  create: false

# -- Secret containing API key for NVIDIA NGC model registry
# Secret is pre-created by configure_oke.py; the chart just references it.
ngcApiSecret:
  name: "ngc-api-secret"
  create: false

# -- Tavily API secret configuration (optional)
# Secret is created so the chart can mount it, but the key is also passed via
# backendEnvVars.TAVILY_SEARCH_API_KEY to bake it into the Deployment spec and
# trigger rolling restarts automatically when the key changes.
tavilyApiSecret:
  name: "tavily-secret"
  password: ""
  create: true

# -- Backend service configuration
replicaCount: 1

image:
  baserepo: nvcr.io
  repository: nvcr.io/nvidia/blueprint/aira-backend
  tag: v1.2.0
  pullPolicy: Always

service:
  type: ClusterIP
  port: 3838

backendEnvVars:
  INSTRUCT_MODEL_NAME: "meta/llama-3.1-8b-instruct"
  INSTRUCT_MODEL_TEMP: "0.0"
  NEMOTRON_MAX_TOKENS: "5000"
  INSTRUCT_MAX_TOKENS: "20000"
  INSTRUCT_BASE_URL: "http://instruct-llm:8000"
  INSTRUCT_API_KEY: "not-needed"
  NEMOTRON_MODEL_NAME: "nvidia/llama-3.3-nemotron-super-49b-v1.5"
  NEMOTRON_MODEL_TEMP: "0.5"
  NEMOTRON_BASE_URL: "http://nim-llm.rag.svc.cluster.local:8000"
  AIRA_APPLY_GUARDRAIL: "false"
  RAG_SERVER_URL: "http://rag-server.rag.svc.cluster.local:8081"
  RAG_INGEST_URL: "http://ingestor-server.rag.svc.cluster.local:8082"

# -- Instruction tuned NIM configuration
nim-llm:
  enabled: true
  service:
    name: "instruct-llm"
  image:
    repository: nvcr.io/nim/meta/llama-3.1-8b-instruct
    tag: "latest"
    pullPolicy: IfNotPresent
  resources:
    limits:
      nvidia.com/gpu: 1
    requests:
      nvidia.com/gpu: 1
  model:
    ngcAPIKey: ""
    name: "meta/llama-3.1-8b-instruct"

# -- Frontend configuration
frontend:
  enabled: true
  service:
    type: NodePort
    port: 3000
    targetPort: 3000
    nodePort: 30080
  image:
    repository: nvcr.io/nvidia/blueprint/aira-frontend
    tag: v1.2.0
    pullPolicy: Always
  replicaCount: 1

# -- Phoenix tracing service
phoenix:
  enabled: true
  image:
    repository: docker.io/arizephoenix/phoenix
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi

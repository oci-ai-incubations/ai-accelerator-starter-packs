version: 2
distro_name: oci
# Aligned to the ogx `oci` distribution run config (new ogx image). The new ogx
# dropped the agents/datasetio/eval/safety/scoring APIs, added responses/
# file_processors/batches, and auto-registers built-in tool groups from the
# configured tool_runtime providers (explicit registered_resources.tool_groups is
# deprecated). paas_rag specifics vs the distro default: OCI 26ai vector_io only,
# S3 files, Nimble Search as the sole web-search provider (so builtin::websearch
# resolves to it), and the vector_stores RAG-formatting tuning block below.
apis:
- batches
- file_processors
- files
- inference
- responses
- tool_runtime
- vector_io
providers:
  inference:
  - provider_id: oci
    provider_type: remote::oci
    config:
      oci_auth_type: ${env.OCI_AUTH_TYPE:=instance_principal}
      oci_config_file_path: ${env.OCI_CONFIG_FILE_PATH:=~/.oci/config}
      oci_config_profile: ${env.OCI_CLI_PROFILE:=DEFAULT}
      oci_region: ${env.OCI_REGION:=us-ashburn-1}
      oci_compartment_id: ${env.OCI_COMPARTMENT_OCID:=}
  vector_io:
  - provider_id: oci
    provider_type: remote::oci
    config:
      conn_str: "${env.OCI26AI_CONNECTION_STRING}"
      user: "${env.OCI26AI_USER}"
      password: "${env.OCI26AI_PASSWORD}"
      vector_datatype: "${env.OCI26AI_VECTOR_DATATYPE:=FLOAT32}"
      distance_metric: "${env.OCI26AI_DISTANCE_METRIC:=COSINE}"
      persistence:
        namespace: vector_io::oci26ai
        backend: kv_default
  responses:
  - provider_id: builtin
    provider_type: inline::builtin
    config:
      persistence:
        responses:
          table_name: responses
          backend: sql_default
          max_write_queue_size: 10000
          num_writers: 4
  tool_runtime:
  - provider_id: nimble-search
    provider_type: remote::nimble-search
    config:
      api_key: ${env.NIMBLEWAY_API_KEY:=}
      max_results: 3
      search_depth: lite
  - provider_id: file-search
    provider_type: inline::file-search
  - provider_id: model-context-protocol
    provider_type: remote::model-context-protocol
  files:
  - provider_id: s3-files
    provider_type: remote::s3
    config:
      bucket_name: "${env.S3_BUCKET_NAME}"
      region: "${env.AWS_REGION:=us-east-1}"
      aws_access_key_id: "${env.AWS_ACCESS_KEY_ID:=}"
      aws_secret_access_key: "${env.AWS_SECRET_ACCESS_KEY:=}"
      endpoint_url: "${env.S3_ENDPOINT_URL:=}"
      auto_create_bucket: ${env.S3_AUTO_CREATE_BUCKET:=false}
      metadata_store:
        table_name: s3_files_metadata
        backend: sql_default
  file_processors:
  - provider_id: auto
    provider_type: inline::auto
  - provider_id: docling
    provider_type: inline::docling
    config:
      default_chunk_size_tokens: 800
      default_chunk_overlap_tokens: 400
      extract_images: true
      images_scale: 2.0
      min_image_dim_px: 64
      caption_images: false
      caption_model: null
      caption_max_tokens: 180
      do_ocr: true
      vlm_model: null
      vlm_preset: granite_docling
  batches:
  - provider_id: reference
    provider_type: inline::reference
    config:
      sqlstore:
        table_name: batches
        backend: sql_default
storage:
  backends:
    kv_default:
      type: kv_sqlite
      db_path: ${env.SQLITE_STORE_DIR:=~/.llama/distributions/oci}/kvstore.db
    sql_default:
      type: sql_sqlite
      db_path: ${env.SQLITE_STORE_DIR:=~/.llama/distributions/oci}/sql_store.db
  stores:
    metadata:
      namespace: registry
      backend: kv_default
    inference:
      table_name: inference_store
      backend: sql_default
      max_write_queue_size: 10000
      num_writers: 4
    conversations:
      table_name: openai_conversations
      backend: sql_default
    prompts:
      table_name: prompts
      backend: sql_default
    connectors:
      table_name: connectors
      backend: sql_default
registered_resources:
  models: []
  vector_stores: []
vector_stores:
  file_search_params:
    header_template: 'file_search tool found {num_chunks} chunks:

      BEGIN of file_search tool results.

      '
    footer_template: 'END of file_search tool results.

      '
  context_prompt_params:
    chunk_annotation_template: 'Result {index}

      Content: {chunk.content}

      Metadata: {metadata}

      '
    context_template: 'The above results were retrieved to help answer the user''s
      query: "{query}". Use them as supporting information only in answering this
      query. {annotation_instruction}

      '
  annotation_prompt_params:
    enable_annotations: true
    annotation_instruction_template: Cite sources immediately at the end of sentences
      before punctuation, using `<|file-id|filename|>` format like 'This is a fact <|file-Cn3MSNn72ENTiiq11Qda4A|filename.txt|>.'.
      Do not add extra punctuation. Use only the file IDs and filenames provided, do not invent
      new ones.
    chunk_annotation_template: '[{index}] {metadata_text} cite as <|{file_id}|>

      {chunk_text}

      '
  file_ingestion_params:
    default_chunk_size_tokens: 512
    default_chunk_overlap_tokens: 128
  chunk_retrieval_params:
    chunk_multiplier: 5
    max_tokens_in_context: 4000
    default_reranker_strategy: rrf
    rrf_impact_factor: 60.0
    weighted_search_alpha: 0.5
  file_batch_params:
    max_concurrent_files_per_batch: 3
    file_batch_chunk_size: 10
    cleanup_interval_seconds: 86400
server:
  port: 8321

version: 2
distro_name: oci-blueprints
apis:
- file_processors
- files
- inference
- responses
- safety
- tool_runtime
- vector_io
providers:
  inference:
  - provider_id: oci
    provider_type: remote::oci
    config:
      refresh_models: true
      oci_auth_type: ${env.OCI_AUTH_TYPE:=instance_principal}
      oci_config_file_path: ${env.OCI_CONFIG_FILE_PATH:=~/.oci/config}
      oci_config_profile: ${env.OCI_CLI_PROFILE:=DEFAULT}
      oci_region: ${env.OCI_REGION:=us-ashburn-1}
      oci_compartment_id: ${env.OCI_COMPARTMENT_OCID:=}
  vector_io:
  - provider_id: oci
    provider_type: remote::oci
    config:
      conn_str: ${env.OCI26AI_CONNECTION_STRING}
      user: ${env.OCI26AI_USER}
      password: ${env.OCI26AI_PASSWORD}
      vector_datatype: ${env.OCI26AI_VECTOR_DATATYPE:=FLOAT32}
      distance_metric: ${env.OCI26AI_DISTANCE_METRIC:=COSINE}
      persistence:
        namespace: vector_id::oci26ai
        backend: kv_default
  responses:
  - provider_id: builtin
    provider_type: inline::builtin
    config:
      persistence:
        agent_state:
          namespace: agents
          backend: kv_default
        responses:
          table_name: responses
          backend: sql_default
          max_write_queue_size: 10000
          num_writers: 4
  tool_runtime:
  - provider_id: brave-search
    provider_type: remote::brave-search
    config:
      api_key: ${env.BRAVE_SEARCH_API_KEY:=}
      max_results: 3
  - provider_id: tavily-search
    provider_type: remote::tavily-search
    config:
      api_key: ${env.TAVILY_SEARCH_API_KEY:=}
      max_results: 3
  - provider_id: file-search
    provider_type: inline::file-search
  - provider_id: model-context-protocol
    provider_type: remote::model-context-protocol
  file_processors:
  - provider_id: auto
    provider_type: inline::auto
  files:
  - provider_id: oci
    provider_type: remote::s3
    config:
      bucket_name: ${env.S3_BUCKET_NAME}
      region: ${env.AWS_REGION:=us-east-1}
      aws_access_key_id: ${env.AWS_ACCESS_KEY_ID:=}
      aws_secret_access_key: ${env.AWS_SECRET_ACCESS_KEY:=}
      endpoint_url: ${env.S3_ENDPOINT_URL:=}
      metadata_store:
        table_name: files_metadata
        backend: sql_default
storage:
  backends:
    kv_default:
      type: kv_sqlite
      db_path: ${env.SQLITE_STORE_DIR:=~/.llama/distributions/oci}/kvstore.db
    sql_default:
      type: sql_sqlite
      db_path: ${env.SQLITE_STORE_DIR:=~/.llama/distributions/oci}/sql_store.db
  stores:
    metadata:
      namespace: registry
      backend: kv_default
    inference:
      table_name: inference_store
      backend: sql_default
      max_write_queue_size: 10000
      num_writers: 4
    conversations:
      table_name: openai_conversations
      backend: sql_default
    prompts:
      namespace: prompts
      backend: kv_default
registered_resources:
  models: []
  shields: []
  vector_dbs: []
  datasets: []
  scoring_fns: []
  benchmarks: []
  tool_groups:
  - toolgroup_id: builtin::websearch
    provider_id: tavily-search
  - toolgroup_id: builtin::file_search
    provider_id: file-search
server:
  port: 8321
  auth:
    provider_config:
      type: custom
      endpoint: ${env.AUTH_VALIDATE_ENDPOINT:=http://localhost:8080/auth/validate}
    access_policy:
    - forbid:
        actions: [create, read, update, delete]
        resource: "regex:^sql_record::(openai_conversations|conversation_items|conversation_messages)::"
      unless:
      - user is owner
      description: conversations are private to their owner, even for admins
    - permit:
        actions: [create, read, update, delete]
      when:
      - user with admin in roles
      description: admins have full access (except conversations, see forbid above)
    - permit:
        actions: [read]
        resource: model::*
    - permit:
        actions: [read]
        resource: "vector_store::*"
      when:
      - resource in user collections
      description: permit read on a vector store when its id was granted to the user in
        the auth-service (surfaced as the "collections" attribute by /auth/validate)
    - permit:
        actions: [create]
      when:
      - resource is unowned
      description: permit create on new resources; ownership is assigned after this check passes
    - permit:
        actions: [create, read, update, delete]
      when:
      - user is owner
vector_stores:
  file_search_params:
    header_template: 'file_search tool found {num_chunks} chunks:

      BEGIN of file_search tool results.

      '
    footer_template: 'END of file_search tool results.

      '
  context_prompt_params:
    chunk_annotation_template: 'Result {index}

      Content: {chunk.content}

      Metadata: {metadata}

      '
    context_template: 'The above results were retrieved to help answer the user''s
      query: "{query}". Use them as supporting information only in answering this
      query. {annotation_instruction}

      '
  annotation_prompt_params:
    enable_annotations: true
    annotation_instruction_template: Cite sources immediately at the end of sentences
      before punctuation, using `<|file-id|filename|>` format like 'This is a fact
      <|file-Cn3MSNn72ENTiiq11Qda4A|filename.txt|>.'. Do not add extra punctuation.
      Use only the file IDs and filenames provided, do not invent new ones.
    chunk_annotation_template: '[{index}] {metadata_text} cite as <|{file_id}|>

      {chunk_text}

      '
  file_ingestion_params:
    default_chunk_size_tokens: 512
    default_chunk_overlap_tokens: 128
  chunk_retrieval_params:
    chunk_multiplier: 5
    max_tokens_in_context: 4000
    default_reranker_strategy: rrf
    rrf_impact_factor: 60.0
    weighted_search_alpha: 0.5
  file_batch_params:
    max_concurrent_files_per_batch: 3
    file_batch_chunk_size: 10
    cleanup_interval_seconds: 86400